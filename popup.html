<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 220px; padding: 15px; font-family: sans-serif; text-align: center; }
    #folderLine {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: #666; margin-bottom: 8px; min-height: 18px;
    }
    #folderName { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; }
    #changeBtn {
      width: auto; min-width: 0; padding: 2px 7px; font-size: 11px;
      background: #e0e0e0; color: #444; font-weight: normal; border-radius: 3px;
    }
    #changeBtn:hover { background: #c8c8c8; }
    .actionBtn {
      width: 100%; padding: 12px; background-color: #0056b3; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
    }
    .actionBtn + .actionBtn { margin-top: 8px; }
    .actionBtn:hover { background-color: #004494; }
    .actionBtn:disabled { background-color: #aaa; cursor: default; }
    #uploadBtn { background-color: #0f7a3a; }
    #uploadBtn:hover { background-color: #0b5c2b; }
    #status { margin-top: 10px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div id="folderLine">
    <span id="folderName"></span>
    <button id="changeBtn" style="display:none;">&#22793;&#26356;</button>
  </div>
  <button id="dlBtn" class="actionBtn">&#30011;&#20687;&#12434;&#12480;&#12454;&#12531;&#12525;&#12540;&#12489;</button>
  <button id="uploadBtn" class="actionBtn">VPS&#12408;&#36865;&#20449;</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
