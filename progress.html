<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>ダウンロード進捗 - Archi Downloader</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            text-align: center;
            background-color: #f5f5f5;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 20px;
            color: #333;
            margin-top: 0;
        }

        #status {
            margin: 20px 0;
            font-size: 16px;
            font-weight: bold;
            color: #0056b3;
            white-space: pre-wrap;
        }

        .progress-bar-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-bar {
            height: 20px;
            width: 0%;
            background-color: #4CAF50;
            transition: width 0.3s;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Archi Downloader</h1>
        <div id="status">準備中...</div>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>
    <script src="progress.js"></script>
</body>

</html>
