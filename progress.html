<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Download Progress - Archi Downloader</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            text-align: center;
            background-color: #f5f5f5;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 20px;
            color: #333;
            margin-top: 0;
        }

        #status {
            margin: 20px 0;
            font-size: 16px;
            font-weight: bold;
            color: #0056b3;
            white-space: pre-wrap;
        }

        .progress-bar-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-bar {
            height: 20px;
            width: 0%;
            background-color: #4CAF50;
            transition: width 0.3s;
        }

        #folderDisplay {
            font-size: 13px;
            color: #555;
            margin: 10px 0 4px;
            word-break: break-all;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }

        #actionBtn {
            padding: 10px 24px;
            font-size: 15px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #actionBtn:hover { background-color: #003d82; }
        #actionBtn:disabled { background-color: #aaa; cursor: default; }

        #actionBtn { display: none; }

        #resultLog {
            margin-top: 14px;
            max-height: 180px;
            overflow-y: auto;
            text-align: left;
            font-size: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px;
            background: #fafafa;
            display: none;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .log-ok { color: #1d6b33; }
        .log-ng { color: #9c1c1c; }
        .log-info { color: #334; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Archi Downloader</h1>
        <div id="status">Preparing...</div>
        <div id="folderDisplay"></div>
        <button id="actionBtn">Choose Folder</button>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="resultLog"></div>
    </div>
    <script src="progress.js"></script>
</body>
</html>
